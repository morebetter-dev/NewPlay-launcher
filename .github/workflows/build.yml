name: Windows build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run dist:win
      - uses: actions/upload-artifact@v6
        with:
          name: newplay-launcher-windows-x64
          path: dist/*
