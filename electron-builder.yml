appId: 'kr.newplay.launcher'
productName: '뉴플레이 런처'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 morebetter-dev; HeliosLauncher © Daniel Scalzi'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs,test,scripts,pack,site}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  icon: 'build/icon.png'
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

directories:
  buildResources: 'build'
  output: 'dist'

publish:
  provider: github
  owner: morebetter-dev
  repo: NewPlay-launcher
  releaseType: draft
